  max_query_length: 512
  max_results_per_page: 100
  rate_limit_requests: 450
  rate_limit_window_seconds: 900

api:
  base_url: "https://api.x.com/2"
  tweet_fields: "id,text,created_at,public_metrics,conversation_id,author_id,referenced_tweets,entities,context_annotations,lang,in_reply_to_user_id,source"
  user_fields: "id,name,username,profile_image_url,public_metrics,description,verified"
  expansions: "author_id"

topic_modeling:
  method: "tfidf_kmeans"
  min_cluster_size: 5
  num_topics: 8
  stop_words_extra:
    - "asco"
    - "ascogu26"
    - "ascogu2026"
    - "ascogu"
    - "gu"
    - "cancer"
    - "patient"
    - "patients"
    - "treatment"
    - "data"
    - "trial"
    - "study"
    - "abstract"

clinical_filters:
  tumor_types:
    Prostate:
      - "prostate"
      - "mCRPC"
      - "mHSPC"
      - "nmCRPC"
      - "CRPC"
      - "HSPC"
    Bladder / Urothelial:
      - "bladder"
      - "urothelial"
      - "MIBC"
      - "NMIBC"
      - "mUC"
      - "muscle-invasive"
    Kidney / RCC:
      - "kidney"
      - "renal"
      - "ccRCC"
      - "RCC"
      - "mRCC"

  drugs:
    enzalutamide: ["enzalutamide", "xtandi"]
    abiraterone: ["abiraterone", "zytiga"]
    darolutamide: ["darolutamide", "nubeqa"]
    apalutamide: ["apalutamide", "erleada"]
    docetaxel: ["docetaxel", "taxotere"]
    cabazitaxel: ["cabazitaxel", "jevtana"]
    radium-223: ["radium-223", "radium223", "xofigo"]
    Lu-PSMA: ["lu-psma", "lutetium", "pluvicto", "177lu"]
    olaparib: ["olaparib", "lynparza"]
    talazoparib: ["talazoparib", "talzenna"]
    niraparib: ["niraparib", "zejula"]
    enfortumab vedotin: ["enfortumab", "padcev"]
    erdafitinib: ["erdafitinib", "balversa"]
    sacituzumab govitecan: ["sacituzumab", "trodelvy"]
    disitamab vedotin: ["disitamab"]
    cabozantinib: ["cabozantinib", "cabometyx", "cometriq"]
    lenvatinib: ["lenvatinib", "lenvima"]
    axitinib: ["axitinib", "inlyta"]
    sunitinib: ["sunitinib", "sutent"]
    pazopanib: ["pazopanib", "votrient"]
    belzutifan: ["belzutifan", "welireg"]
    tivozanib: ["tivozanib", "fotivda"]
    pembrolizumab: ["pembrolizumab", "keytruda"]
    nivolumab: ["nivolumab", "opdivo"]
    ipilimumab: ["ipilimumab", "yervoy"]
    atezolizumab: ["atezolizumab", "tecentriq"]
    avelumab: ["avelumab", "bavencio"]

summarizer:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.3
