project:
  name: "ASCO GU 2026 Monitor"
  db_path: "data/ascogu26.db"
  exports_dir: "data/exports"
  briefs_dir: "data/briefs"

collection:
  hashtags:
    - "#ASCOGU26"
    - "#ASCOGU2026"
    - "#ASCOGU"

  keywords:
    - "ASCO GU 2026"

  # Filtros para queries de contas curadas (tweets GU-relevantes mesmo sem hashtag)
